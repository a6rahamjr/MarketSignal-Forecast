[project]
name = "MarketSignal Forecast"
random_seed = 42
artifact_dir = "artifacts"
data_dir = "data/generated"

[data]
source = "synthetic"
symbol = "DEMO"
rows = 1800
start_date = "2018-01-01"
csv_path = ""
period = "10y"
interval = "1d"

[features]
forecast_horizon = 1
minimum_history = 80

[training]
test_fraction = 0.20
tune = true
cv_splits = 5
search_iterations = 10
search_estimators = 160
abstain_margin = 0.04
transaction_cost_bps = 2.0

[model]
n_estimators = 400
min_samples_leaf = 8
max_features = 0.75
max_depth = 0
